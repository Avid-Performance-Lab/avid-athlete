<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AVID Athlete" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon_avid_A.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>AVID Athlete</title>
    <script>
      (function() {
        try {
          var urlParams = new URLSearchParams(window.location.search);
          var idFromUrl = urlParams.get('id');

          if (idFromUrl) {
            // Lien reçu avec un ID → on le mémorise
            localStorage.setItem('avid_athlete_id', idFromUrl);
          } else {
            // Pas d'ID dans l'URL (ex: lancement depuis écran d'accueil)
            // On récupère l'ID sauvegardé et on le remet dans l'URL
            var savedId = localStorage.getItem('avid_athlete_id');
            if (savedId) {
              var newUrl = window.location.protocol + '//' +
                           window.location.host +
                           window.location.pathname +
                           '?id=' + savedId;
              window.history.replaceState({}, '', newUrl);
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
