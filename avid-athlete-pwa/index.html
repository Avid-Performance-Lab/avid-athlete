<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AVID Athlete" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>AVID Athlete</title>

    <script>
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const idFromUrl = urlParams.get('id');
        
        if (idFromUrl) {
          // Étape 1 : On mémorise l'ID dès qu'il est présent dans le lien
          localStorage.setItem('athleteId', idFromUrl);
        } else {
          // Étape 2 : Si l'ID a disparu (cas de l'app installée), on le récupère en mémoire
          const savedId = localStorage.getItem('athleteId');
          if (savedId) {
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + savedId;
            // Étape 3 : On remet l'ID discrètement dans l'URL pour que l'app fonctionne
            window.history.replaceState({path:newUrl}, '', newUrl);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
